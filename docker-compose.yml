services:
  backend:
    build: ./backend
    container_name: fincluster_backend
    ports:
      - "8000:8000"
    volumes:
      - fincluster_data:/app/data
    environment:
      APP_ENV: ${APP_ENV}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ACCESS_TOKEN_HOURS: ${ACCESS_TOKEN_HOURS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      EXTERNAL_AI_ENABLED: ${EXTERNAL_AI_ENABLED:-false}
      AI_API_TIMEOUT_SECONDS: ${AI_API_TIMEOUT_SECONDS:-5}
      AI_API_MAX_REQUESTS_PER_MINUTE: ${AI_API_MAX_REQUESTS_PER_MINUTE:-8}
      AI_DATASET_PATH: /app/data/transactions.db
      LOCAL_MODEL_ALGORITHM: ${LOCAL_MODEL_ALGORITHM:-random_forest}
      LOCAL_MODEL_PATH: ${LOCAL_MODEL_PATH:-}
      HUMAN_REVIEW_ENABLED: ${HUMAN_REVIEW_ENABLED:-true}
      HUMAN_REVIEW_CONFIDENCE_THRESHOLD: ${HUMAN_REVIEW_CONFIDENCE_THRESHOLD:-0.25}
      HUMAN_REVIEW_FALLBACK_REQUIRED: ${HUMAN_REVIEW_FALLBACK_REQUIRED:-true}
      AUTO_RETRAIN_ENABLED: ${AUTO_RETRAIN_ENABLED:-false}
      AUTO_RETRAIN_MIN_REVIEWED: ${AUTO_RETRAIN_MIN_REVIEWED:-100}
      AUTO_RETRAIN_BATCH_SIZE: ${AUTO_RETRAIN_BATCH_SIZE:-25}
      AUTO_RETRAIN_ALGORITHM: ${AUTO_RETRAIN_ALGORITHM:-random_forest}
      AUTO_RETRAIN_MODEL_PATH: /app/models/transaction_classifier.joblib
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/telemetry}
    container_name: fincluster_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fincluster_data:
