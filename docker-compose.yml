services:
  backend:
    build:
      context: ./backend
      args:
        INSTALL_XGBOOST: ${INSTALL_XGBOOST:-true}
    container_name: fincluster_backend
    ports:
      - "8000:8000"
    volumes:
      - fincluster_data:/app/data
    environment:
      APP_ENV: ${APP_ENV}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ACCESS_TOKEN_HOURS: ${ACCESS_TOKEN_HOURS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATABASE_URL: ${DATABASE_URL:-}
      TELEMETRY_BROADCAST_INTERVAL_SECONDS: ${TELEMETRY_BROADCAST_INTERVAL_SECONDS:-1.0}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      EXTERNAL_AI_ENABLED: ${EXTERNAL_AI_ENABLED:-false}
      AI_API_TIMEOUT_SECONDS: ${AI_API_TIMEOUT_SECONDS:-5}
      AI_API_MAX_REQUESTS_PER_MINUTE: ${AI_API_MAX_REQUESTS_PER_MINUTE:-8}
      AI_DATASET_PATH: /app/data/transactions.db
      AI_DATASET_MAX_ROWS: ${AI_DATASET_MAX_ROWS:-10000}
      AUTO_DATA_SAMPLE_EVERY: ${AUTO_DATA_SAMPLE_EVERY:-25}
      LOCAL_MODEL_ALGORITHM: ${LOCAL_MODEL_ALGORITHM:-auto}
      LOCAL_MODEL_PATH: ${LOCAL_MODEL_PATH:-/app/data/models/transaction_classifier.joblib}
      HUMAN_REVIEW_ENABLED: ${HUMAN_REVIEW_ENABLED:-true}
      HUMAN_REVIEW_CONFIDENCE_THRESHOLD: ${HUMAN_REVIEW_CONFIDENCE_THRESHOLD:-0.25}
      HUMAN_REVIEW_FALLBACK_REQUIRED: ${HUMAN_REVIEW_FALLBACK_REQUIRED:-true}
      AUTO_RETRAIN_ENABLED: ${AUTO_RETRAIN_ENABLED:-true}
      AUTO_RETRAIN_MIN_REVIEWED: ${AUTO_RETRAIN_MIN_REVIEWED:-100}
      AUTO_RETRAIN_BATCH_SIZE: ${AUTO_RETRAIN_BATCH_SIZE:-100}
      AUTO_RETRAIN_ALGORITHM: ${AUTO_RETRAIN_ALGORITHM:-auto}
      AUTO_RETRAIN_MODEL_PATH: ${AUTO_RETRAIN_MODEL_PATH:-/app/data/models/transaction_classifier.joblib}
      AUTO_RETRAIN_MIN_SELECTION_SCORE: ${AUTO_RETRAIN_MIN_SELECTION_SCORE:-0.60}
      AUTO_RETRAIN_MIN_RECALL: ${AUTO_RETRAIN_MIN_RECALL:-0.55}
      AUTO_RETRAIN_MIN_BALANCED_ACCURACY: ${AUTO_RETRAIN_MIN_BALANCED_ACCURACY:-0.60}
      AUTO_RETRAIN_DEMO_MIN_SECONDS: ${AUTO_RETRAIN_DEMO_MIN_SECONDS:-1.0}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/telemetry}
    container_name: fincluster_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fincluster_data:
